{% extends "base.html" %}

{% block title_section %} Edit Page {% endblock %}

{% block function_section %}
{% if words %}
	<ul>
		{% for word in words %}
			<li><a href="{{ url_for('edit_specific_page', word_id=word[0]) }}">{{ word[1] }}</a></li>
		{% endfor %}
	</ul>
{% else %}
	<p>No words found.</p>
{% endif %}
{%  endblock %}

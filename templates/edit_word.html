{% extends "base.html" %}

{% block title_section %} Edit Word {% endblock %}

{% block function_section %}
{% if word %}
	<p> Selected word: {{ word[1] }} </p>
{% endif %}
{% if rhymes %}
	<p> Rhymes: </p>
	{% for rhyme in rhymes %}
		<p> {{ rhyme[1] }} </p>
	{% endfor %}
{% endif %}
{% endblock %}

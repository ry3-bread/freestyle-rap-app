{% extends "base.html" %}

{% block title_section %} Rename Word {% endblock %}

{% block function_section %}
<p> Selected word: {{ word[1] }} </p>
<form action="{{ url_for('edit_rename_page', word_id=word[0]) }}" method="POST">
	<label for="rename_word">Rename to:</label><br>
	<input type="text" id="rename_word" name="rename_word"><br>
	<input type="submit" value="Submit">
</form>
{% endblock %}
